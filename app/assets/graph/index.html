<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Synapse hypergraph</title>
  <!-- vis-network 9.x — DESIGN_UI line ~493 명시 라이브러리. CDN 정책은
       google_fonts 와 동일: 데이터-bearing 자산은 온디바이스, 3rd-party
       라이브러리는 CDN 캐시 기반. -->
  <script src="https://unpkg.com/vis-network@9/standalone/umd/vis-network.min.js"></script>
  <style>
    /* DESIGN_UI §디자인 토큰 — 시안의 hypergraph 캔버스 동일.
       CSS 변수는 Flutter 측에서 수정 안 함, 변경은 DESIGN_UI 단일 출처. */
    :root {
      --bg: #0A0B0E;
      --bg-2: #0E1014;
      --border: #252730;
      --border-strong: #3A3D4A;
      --text: #E8E4D9;
      --text-2: #B8B4A9;
      --text-3: #7A7B82;
      --text-4: #555761;
      --accent: #C8A96E;
      --accent-2: #D9BC83;
      --accent-line: rgba(200, 169, 110, 0.4);
      --node: #8A8B92;
      /* 카테고리 19 색은 tokens.dart 의 categoryColors19 단일 출처
         (DESIGN_SYSTEM.md §75, §78). Flutter 측이 그래프 페이로드의
         theme.categoryColors 로 코드→hex 매핑을 보내고, 아래 JS 가
         CAT_COLOR 에 채운다. 인라인 hex 금지. */
    }
    * { box-sizing: border-box; }
    html, body, #graph {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      background: var(--bg);
      overflow: hidden;
    }
    body {
      /* 시안의 hypergraph 캔버스 배경 (radial-gradient 중심을 살짝 밝게). */
      background: radial-gradient(ellipse at center, #0c0d11 0%, var(--bg) 70%);
      font-family: "JetBrains Mono", ui-monospace, "SF Mono", monospace;
      color: var(--text-2);
    }
    #status {
      position: absolute;
      top: 12px; left: 12px;
      background: rgba(20,21,25,0.85);
      backdrop-filter: blur(8px);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 10px;
      color: var(--text-3);
      pointer-events: none;
      letter-spacing: 0.05em;
    }
    #status.idle { display: none; }
  </style>
</head>
<body>
  <div id="graph"></div>
  <div id="status" class="idle"></div>

  <script>
    // ── Categories ────────────────────────────────────────────
    // CAT_COLOR is populated from graph payload's `theme.categoryColors`
    // (single source = tokens.dart categoryColors19). Empty until the
    // first `synapseSetGraph` call, after which all primaryCategoryCode
    // lookups resolve via this map.
    let CAT_COLOR = {};
    const NODE_FALLBACK = getCss('--node');
    const NODE_INSIGHT = getCss('--accent-2');
    const EDGE_BASE = getCss('--border-strong');

    function getCss(name) {
      return getComputedStyle(document.documentElement)
        .getPropertyValue(name).trim();
    }

    // ── Bridge ────────────────────────────────────────────────
    // Flutter calls window.synapseSetGraph(jsonString) after the WebView
    // boots. The shape mirrors `GraphData` from synapse_engine.
    //
    // Reuse DataSets across pushes so already-stabilized nodes keep
    // their positions instead of flickering on every save.
    let network = null;
    let nodesData = null;
    let edgesData = null;

    // 2 s — long enough for stabilization to complete on real graphs,
    // short enough that a stuck simulation doesn't hog frame budget.
    const PHYSICS_BACKSTOP_MS = 2000;

    // Replace whatever's in `ds` with `items`, computing the remove set
    // ourselves — vis-network's DataSet has update() (insert/upsert) and
    // remove() but no built-in "diff against full new collection".
    function reconcile(ds, items) {
      const oldIds = new Set(ds.getIds());
      const newIds = new Set(items.map(x => x.id));
      let added = 0;
      for (const id of newIds) {
        if (!oldIds.has(id)) added++;
      }
      const removed = [...oldIds].filter(id => !newIds.has(id));
      ds.update(items);
      if (removed.length > 0) ds.remove(removed);
      return { added, removed: removed.length };
    }

    function setStatus(text) {
      const el = document.getElementById('status');
      if (!text) {
        el.classList.add('idle');
        el.textContent = '';
      } else {
        el.classList.remove('idle');
        el.textContent = text;
      }
    }

    window.synapseSetGraph = function (jsonString) {
      let data;
      try {
        data = JSON.parse(jsonString);
      } catch (e) {
        setStatus('데이터 파싱 실패: ' + e.message);
        return;
      }
      if (data.theme && data.theme.categoryColors) {
        CAT_COLOR = data.theme.categoryColors;
      }
      render(data);
    };

    function render(g) {
      const nodeCount = g.nodes ? g.nodes.length : 0;
      const sentCount = g.sentences ? g.sentences.length : 0;
      if (nodeCount === 0) {
        setStatus('노드 없음 — 노트를 작성하고 ⌘S 로 의미 처리하세요.');
        if (network) {
          network.destroy();
          network = null;
        }
        return;
      }

      // Bipartite layout (β). v22 데이터 모델 (DESIGN_HYPERGRAPH §스키마):
      //   nodes ───── node_sentence_mentions ───── sentences
      // 그대로 시각으로 옮김. 같은 sentence 안 노드 N 개는 그 sentence
      // 점 하나에서 묶인다 ("바구니에 담겼다"). 페어 N(N-1)/2 환원이
      // 아니라 mentions 1:1.
      //
      // 일반 노드는 주인공 (degree-비례 큰 점, 카테고리 색), sentence
      // 점은 보조 (작은 다이아, --text-4 회색). 통찰 sentence
      // (origin='insight') 만 sentence 자체가 앰버로 강조됨 — 가치 B
      // (Hebbian 통찰 허브) 는 본체 sentence 가 그 자체로 시각의 무게
      // 중심.
      // Build a category lookup so we can walk a sentence's heading
      // category up to its root (parent_id IS NULL). The root tells us
      // whether it's a seed-19 root or a user-heading root → drives color.
      const catById = new Map();
      for (const c of (g.categories || [])) catById.set(c.id, c);
      function rootOf(catId) {
        let cur = catById.get(catId);
        while (cur && cur.parentId != null) {
          cur = catById.get(cur.parentId);
        }
        return cur;
      }

      // Per-node multi-category palette: every seed-root color the node
      // maps to (deduped, in category_id order). Drives the segmented
      // border ring drawn by ctxRenderer below — N>=2 categories → ring
      // gets N equal arcs, N==1 → single-color outline, N==0 → no border.
      const nodeRingColors = new Map();
      for (const nc of (g.nodeCategories || [])) {
        const root = rootOf(nc.categoryId);
        if (!root || !root.code || !CAT_COLOR[root.code]) continue;
        const color = CAT_COLOR[root.code];
        const list = nodeRingColors.get(nc.nodeId) || [];
        if (!list.includes(color)) list.push(color);
        nodeRingColors.set(nc.nodeId, list);
      }

      // Cache CSS-variable lookups once per render — getComputedStyle is
      // a style-resolve, paying it ~2x per node would dwarf the ring-arc
      // savings we just got from the hybrid path.
      const TEXT = getCss('--text');
      const TEXT2 = getCss('--text-2');

      const LABEL_MIN_DEGREE = 4;
      const visNodes = g.nodes.map(n => {
        const r = nodeRadius(n);
        const fill = nodeColor(n);
        const ring = nodeRingColors.get(n.id) || [];
        const degree = n.degree || 0;
        const isHub = degree >= 8;
        const showLabel = n.isInsight || degree >= LABEL_MIN_DEGREE;
        const font = {
          color: n.isInsight ? NODE_INSIGHT : (isHub ? TEXT : TEXT2),
          face: 'JetBrains Mono, ui-monospace, monospace',
          size: n.isInsight ? 12 : (isHub ? 11 : 10),
          strokeWidth: 0,
        };
        const label =
            showLabel ? (n.isInsight ? '✦ ' + n.name : n.name) : ' ';

        // Hybrid: only multi-category non-insight nodes need the
        // canvas-direct ring renderer (heavy: N+1 arcs per frame). Single
        // category / no category / insight stay on vis's native dot
        // shape, which has a much faster built-in draw path.
        if (!n.isInsight && ring.length >= 2) {
          return {
            id: 'n:' + n.id,
            label,
            font,
            shape: 'custom',
            ctxRenderer: makeNodeRenderer({ r, fill, ring, n }),
          };
        }

        let borderColor = fill;
        let borderWidth = 0;
        if (n.isInsight) {
          borderColor = NODE_INSIGHT;
          borderWidth = 2;
        } else if (ring.length === 1) {
          borderColor = ring[0];
          borderWidth = 1.5;
        }
        return {
          id: 'n:' + n.id,
          label,
          font,
          shape: 'dot',
          color: { background: fill, border: borderColor },
          size: r,
          borderWidth,
          shadow: shadowFor(n, fill),
        };
      });

      // Distinct user-heading roots (parent_id IS NULL && code IS NULL)
      // get assigned a distinct hue from a small palette. Seed-19 roots
      // (code != null) use --node-fallback gray for sentences (sentences
      // shouldn't co-opt seed colors which belong to nodes).
      const USER_PALETTE = [
        '#6E9DC8', '#5DAB8A', '#B68AC8', '#8AC8B6',
        '#D9A55D', '#C85D5D', '#7A7B82',
      ];
      const userRootColor = new Map();
      let nextPaletteIdx = 0;
      function colorForUserRoot(rootId) {
        if (!userRootColor.has(rootId)) {
          userRootColor.set(rootId, USER_PALETTE[nextPaletteIdx % USER_PALETTE.length]);
          nextPaletteIdx++;
        }
        return userRootColor.get(rootId);
      }

      // sentence_id → primary heading category id (lowest id wins —
      // deterministic, matches getGraph primaryCategoryCode policy).
      const sentenceCatId = new Map();
      for (const sc of (g.sentenceCategories || [])) {
        const cur = sentenceCatId.get(sc.sentenceId);
        if (cur == null || sc.categoryId < cur) {
          sentenceCatId.set(sc.sentenceId, sc.categoryId);
        }
      }

      // Sentence basket dots. Only `origin='insight'` sentences are drawn
      // (amber diamond + glow — 가치 B 통찰 중력). Regular sentences stay
      // in the dataset as size-0 invisible anchors so the bipartite force
      // layout still pulls co-occurring nodes together — they just don't
      // add visual noise. The "what's in this basket" answer lives in the
      // node-click detail panel (F8'-3) instead of on the canvas.
      const sentencePost = new Map();
      const insightSentenceIds = new Set();
      for (const s of (g.sentences || [])) {
        sentencePost.set(s.id, s.postId);
        const isInsight = s.origin === 'insight';
        if (isInsight) insightSentenceIds.add(s.id);
        if (isInsight) {
          visNodes.push({
            id: 's:' + s.id,
            label: ' ',
            color: { background: NODE_INSIGHT, border: NODE_INSIGHT },
            size: 6,
            shape: 'diamond',
            shadow: { enabled: true, color: 'rgba(217,188,131,0.6)', size: 10, x: 0, y: 0 },
          });
        } else {
          // Hidden anchor — invisible to the user, alive to the physics.
          visNodes.push({
            id: 's:' + s.id,
            label: ' ',
            color: { background: 'rgba(0,0,0,0)', border: 'rgba(0,0,0,0)' },
            size: 0.1,
            shape: 'dot',
          });
        }
      }

      // Edges = mentions, 1:1 (node ↔ sentence basket). Edges to insight
      // sentences get a faint amber line (helps the eye trace which nodes
      // contributed to a 통찰); edges to regular sentences are fully
      // transparent — the force layout uses them as springs without
      // drawing the cobweb that 4500+ mentions would otherwise produce.
      const visEdges = (g.mentions || []).map(m => {
        const toInsight = insightSentenceIds.has(m.sentenceId);
        return {
          // Stable id so DataSet.update / remove can reconcile across
          // subsequent pushes instead of clear-and-readd (which would
          // momentarily strip the springs from the layout).
          id: 'e:' + m.nodeId + '-' + m.sentenceId,
          from: 'n:' + m.nodeId,
          to: 's:' + m.sentenceId,
          color: toInsight
              ? { color: getCss('--accent-line'), opacity: 0.4 }
              : { color: 'rgba(0,0,0,0)', opacity: 0 },
          width: toInsight ? 0.6 : 0.4,
          smooth: false,
        };
      });

      const container = document.getElementById('graph');
      const options = {
        physics: {
          enabled: true,
          // Bipartite force-layout: mentions are springs that pull a node
          // and its sentence basket together; barnesHut repels everything
          // else. avoidOverlap=1 keeps node dots from intersecting.
          //
          // 300 iterations: enough for ~1k nodes to find a usable layout
          // without freezing the canvas for 1~2s. Larger graphs may want
          // to fall back to cached positions instead of re-stabilizing
          // from scratch.
          stabilization: { iterations: 300, fit: true },
          barnesHut: {
            gravitationalConstant: -12000,
            centralGravity: 0.15,
            springLength: 140,
            springConstant: 0.03,
            damping: 0.9,
            avoidOverlap: 1.0,
          },
        },
        interaction: {
          dragNodes: false,
          hover: false,        // F8'-2 — click/hover handlers in F8'-3
          tooltipDelay: 0,
          zoomView: true,
          dragView: true,
        },
        nodes: { borderWidthSelected: 0 },
        edges: { selectionWidth: 0 },
      };
      // Detect a shape flip on any existing node — vis-network's DataSet
      // update() merges attributes but doesn't re-instantiate the
      // internal node object on shape change, leaving stale custom
      // ctxRenderer hooks (or stale dot internals). When that happens
      // the canvas goes blank for those nodes, so we tear down and
      // rebuild instead of reconciling.
      const shapeFlipped = network !== null && visNodes.some(n => {
        const old = nodesData.get(n.id);
        return old && old.shape !== n.shape;
      });

      if (network === null || shapeFlipped) {
        if (network !== null) network.destroy();
        nodesData = new vis.DataSet(visNodes);
        edgesData = new vis.DataSet(visEdges);
        network = new vis.Network(
          container,
          { nodes: nodesData, edges: edgesData },
          options,
        );
        network.on('stabilizationIterationsDone', forcePhysicsOff);
        network.on('click', (params) => {
          let nodeId = null;
          if (params && Array.isArray(params.nodes) && params.nodes.length > 0) {
            const raw = String(params.nodes[0]);
            if (raw.startsWith('n:')) {
              nodeId = parseInt(raw.slice(2), 10);
              if (Number.isNaN(nodeId)) nodeId = null;
            }
          }
          if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
            window.flutter_inappwebview.callHandler('synapseNodeClicked', nodeId);
          }
        });
        schedulePhysicsBackstop();
      } else {
        const nodeDelta = reconcile(nodesData, visNodes);
        const edgeDelta = reconcile(edgesData, visEdges);
        const topologyChanged =
            nodeDelta.added > 0 || nodeDelta.removed > 0 ||
            edgeDelta.added > 0 || edgeDelta.removed > 0;
        if (topologyChanged) {
          network.setOptions({ physics: { enabled: true } });
          network.stabilize(300);
          schedulePhysicsBackstop();
        }
      }
      setStatus('노드 ' + nodeCount + ' · 바구니 ' + sentCount);
    }

    let physicsBackstopTimer = null;
    function forcePhysicsOff() {
      if (network === null) return;
      network.setOptions({ physics: { enabled: false } });
      if (physicsBackstopTimer !== null) {
        clearTimeout(physicsBackstopTimer);
        physicsBackstopTimer = null;
      }
    }
    // stabilizationIterationsDone occasionally never fires (fit:true edge
    // cases, very small iter counts). After every push that runs physics,
    // force the simulation off so the canvas stops eating frame budget
    // for nothing.
    function schedulePhysicsBackstop() {
      if (physicsBackstopTimer !== null) clearTimeout(physicsBackstopTimer);
      physicsBackstopTimer = setTimeout(forcePhysicsOff, PHYSICS_BACKSTOP_MS);
    }

    function nodeRadius(n) {
      if (n.isInsight) return 16;
      const isolated = (n.degree || 0) <= 0;
      if (isolated) return 2.5;
      return Math.min(14, 3 + Math.sqrt(n.degree) * 2.2);
    }

    function nodeColor(n) {
      if (n.isInsight) return NODE_INSIGHT;
      if (n.degree <= 0) return getCss('--text-4');
      const code = n.primaryCategoryCode;
      if (code && CAT_COLOR[code]) return CAT_COLOR[code];
      return NODE_FALLBACK;
    }

    function shadowFor(n, fill) {
      if (n.isInsight) {
        return { enabled: true, color: 'rgba(217,188,131,0.7)', size: 14, x: 0, y: 0 };
      }
      if ((n.degree || 0) >= 8) {
        return { enabled: true, color: fill + '88', size: 8, x: 0, y: 0 };
      }
      return { enabled: false };
    }

    // Returns a ctxRenderer that draws a vis "dot" by hand so multi-
    // category nodes can show every seed-root color in the border ring.
    // Only used for nodes with 2+ category colors — the native dot path
    // handles 0/1/insight cases an order of magnitude faster.
    // Label/font are still drawn by vis externally from the node's
    // `font` config — we only return nodeDimensions for text placement.
    function makeNodeRenderer({ r, fill, ring, n }) {
      // Invariant: this renderer is only attached when ring.length >= 2
      // and !n.isInsight (see hybrid branch in synapseSetGraph). 0/1/
      // insight cases use vis's native dot shape.
      return ({ ctx, x, y }) => ({
        drawNode: () => {
          if ((n.degree || 0) >= 8) {
            ctx.shadowColor = fill + '88';
            ctx.shadowBlur = 8;
          } else {
            ctx.shadowColor = 'transparent';
            ctx.shadowBlur = 0;
          }

          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = fill;
          ctx.fill();

          // Drop the shadow before stroking — otherwise the halo doubles
          // onto each ring arc.
          ctx.shadowColor = 'transparent';
          ctx.shadowBlur = 0;

          ctx.lineWidth = 1.5;
          const seg = (Math.PI * 2) / ring.length;
          for (let i = 0; i < ring.length; i++) {
            ctx.strokeStyle = ring[i];
            ctx.beginPath();
            ctx.arc(
              x, y, r,
              -Math.PI / 2 + i * seg,
              -Math.PI / 2 + (i + 1) * seg,
            );
            ctx.stroke();
          }
        },
        nodeDimensions: { width: r * 2, height: r * 2 },
      });
    }

    // Boot: tell Flutter we're ready so it can push the graph data. The
    // host registers `synapseReady` via flutter_inappwebview's
    // addJavaScriptHandler in graph_view.dart.
    setStatus('vis-network 로딩 대기…');
    window.addEventListener('load', () => {
      setStatus('데이터 대기 중…');
      if (window.flutter_inappwebview && window.flutter_inappwebview.callHandler) {
        window.flutter_inappwebview.callHandler('synapseReady');
      }
    });
  </script>
</body>
</html>
