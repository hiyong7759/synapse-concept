model: "unsloth/gemma-4-E2B-it-UD-MLX-4bit"
train: true
fine_tune_type: lora
optimizer: adamw
seed: 0

data: "data/finetune/tasks/security-access"
adapter_path: "runpod_output/mlx_adapters/security-access"

num_layers: 8
batch_size: 1
grad_accumulation_steps: 4
iters: 400
learning_rate: 2e-4
max_seq_length: 2048
grad_checkpoint: true

val_batches: 25
steps_per_report: 10
steps_per_eval: 50
save_every: 50

mask_prompt: true

lora_parameters:
  keys: ["self_attn.q_proj", "self_attn.k_proj", "self_attn.v_proj", "self_attn.o_proj"]
  rank: 16
  scale: 32.0
  dropout: 0.05
