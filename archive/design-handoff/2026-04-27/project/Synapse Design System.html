<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <title>Synapse Design System</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Noto+Sans+KR:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="tokens.css" />
  <style>
    body { background: #06070a; }
    /* DC tweak */
    .dc-artboard-content { background: var(--bg) !important; }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel" src="components.jsx"></script>
  <script type="text/babel" src="foundations.jsx"></script>
  <script type="text/babel" src="screens.jsx"></script>

  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;

    function App() {
      return (
        <DesignCanvas title="Synapse — Design System">
          <DCSection id="brand" title="01 / Brand">
            <DCArtboard id="cover" label="Cover" width={900} height={1200}>
              <BrandCover />
            </DCArtboard>
            <DCArtboard id="logo" label="Logo Suite" width={720} height={680}>
              <BrandMarkCard />
            </DCArtboard>
          </DCSection>

          <DCSection id="foundations" title="02 / Foundations">
            <DCArtboard id="color" label="Color" width={1100} height={780}>
              <ColorCard />
            </DCArtboard>
            <DCArtboard id="type" label="Typography" width={1100} height={920}>
              <TypeCard />
            </DCArtboard>
          </DCSection>

          <DCSection id="components" title="03 / Components">
            <DCArtboard id="gallery" label="Core Components" width={1100} height={1080}>
              <ComponentGallery />
            </DCArtboard>
          </DCSection>

          <DCSection id="screens" title="04 / Screen Applications — Desktop">
            <DCArtboard id="note" label="/note — 지식 축적" width={1280} height={780}>
              <NoteScreen />
            </DCArtboard>
            <DCArtboard id="synapse" label="/synapse — 인출·융합" width={1280} height={780}>
              <SynapseScreen />
            </DCArtboard>
            <DCArtboard id="hypergraph" label="/hypergraph — 노드 중심 + Hover 패널" width={1440} height={820}>
              <HypergraphScreen />
            </DCArtboard>
          </DCSection>

          <DCSection id="mobile" title="05 / Screen Applications — Mobile + Modal">
            <DCArtboard id="m-note" label="/note (mobile)" width={390} height={780}>
              <MobileNote />
            </DCArtboard>
            <DCArtboard id="m-synapse" label="/synapse (mobile)" width={390} height={780}>
              <MobileSynapse />
            </DCArtboard>
            <DCArtboard id="modal" label="통찰 승격 모달" width={720} height={520}>
              <PromoteModalCard />
            </DCArtboard>
          </DCSection>
        </DesignCanvas>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
